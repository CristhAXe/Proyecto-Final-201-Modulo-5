<!doctype html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>Análisis de Gastos - pigSave+</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;700;800&amp;display=swap"
        rel="stylesheet" />
    <link
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
        rel="stylesheet" />
    <style>
        .material-symbols-outlined {
            font-variation-settings:
                "FILL" 0,
                "wght" 400,
                "GRAD" 0,
                "opsz" 24;
        }
    </style>
    <script src="../assets/tailwind/dashboard-tailwind.js">
    </script>
</head>

<body class="bg-background font-body-lg text-on-background">
    <div class="relative flex h-auto min-h-screen w-full flex-col bg-background group/design-root overflow-x-hidden">
        <div class="layout-container flex h-full grow flex-col">
            <div class="px-4 md:px-40 flex flex-1 justify-center py-5">
                <div class="layout-content-container flex flex-col max-w-[960px] flex-1">
                    <!-- Header -->
                    <header class="flex items-center justify-between mb-16 px-4">
                        <div class="flex items-center gap-2">
                            <span class="material-symbols-outlined text-primary size-6">savings</span>
                            <span
                                class="font-display font-extrabold text-lg tracking-tight text-on-surface">pigSave+</span>
                        </div>
                        <div class="flex items-center gap-4">
                            <button
                                class="flex items-center gap-2 px-4 py-2 bg-surface-container-low text-on-surface hover:bg-surface-container-high rounded-xl soft-transition font-bold text-sm stitch-anim-fade-in">
                                <span class="material-symbols-outlined text-lg">picture_as_pdf</span>
                                <span class="">Imprimir a PDF</span></button>

                        </div>
                    </header>
                    <!-- Main Content -->
                    <div class="flex flex-col gap-8 px-4">
                        <!-- Summary Section -->
                        <div class="flex flex-col gap-2">
                            <p class="text-headline-lg text-on-background">
                                Gastos Totales
                            </p>
                            <div class="flex items-baseline gap-2">
                                <p class="text-display text-primary">$3,450.00</p>
                                <span class="flex items-center text-error font-bold text-body-lg">

                            </div>
                        </div>
                        <!-- Time Range Selector -->
                        <div class="flex bg-surface-container-low p-1 rounded-xl w-full max-w-xs">
                            <div
                                class="flex-1 py-2 px-4 text-center rounded-lg text-body-sm font-bold bg-surface-container-lowest text-primary shadow-sm">
                                Octubre 2023
                            </div>
                        </div>
                        <!-- Analysis Layout: Donut & List -->
                        <div class="grid grid-cols-1 md:grid-cols-2 gap-stack-lg items-center">
                            <!-- Visual Representation -->
                            <div
                                class="flex flex-col items-center justify-center p-8 bg-surface-container-lowest rounded-xl shadow-[0_4px_20px_rgba(25,90,191,0.06)] relative border border-surface-container">
                                <!-- Chanchito Character Badge -->
                                <div class="absolute -top-6 -right-4 bg-tertiary-fixed p-3 rounded-full shadow-md">
                                    <span class="material-symbols-outlined text-tertiary text-3xl"
                                        style="font-variation-settings: &quot;FILL&quot; 1">savings</span>
                                </div>
                                <!-- SVG Donut Chart -->
                                <div class="relative size-64">
                                    <svg class="size-full" viewbox="0 0 36 36">
                                        <path class="text-surface-container"
                                            d="M18 2.0845 a 15.9155 15.9155 0 0 1 0 31.831 a 15.9155 15.9155 0 0 1 0 -31.831"
                                            fill="none" stroke="currentColor" stroke-width="4"></path>
                                        <!-- Rent: 30% (Primary) -->
                                        <path class="text-primary"
                                            d="M18 2.0845 a 15.9155 15.9155 0 0 1 0 31.831 a 15.9155 15.9155 0 0 1 0 -31.831"
                                            fill="none" stroke="currentColor" stroke-dasharray="30, 100"
                                            stroke-linecap="round" stroke-width="4"></path>
                                        <!-- Health: 25% (Secondary) -->
                                        <path class="text-secondary"
                                            d="M18 2.0845 a 15.9155 15.9155 0 0 1 0 31.831 a 15.9155 15.9155 0 0 1 0 -31.831"
                                            fill="none" stroke="currentColor" stroke-dasharray="25, 100"
                                            stroke-dashoffset="-30" stroke-linecap="round" stroke-width="4"></path>
                                        <!-- Tech: 20% (Tertiary) -->
                                        <path class="text-tertiary-container"
                                            d="M18 2.0845 a 15.9155 15.9155 0 0 1 0 31.831 a 15.9155 15.9155 0 0 1 0 -31.831"
                                            fill="none" stroke="currentColor" stroke-dasharray="20, 100"
                                            stroke-dashoffset="-55" stroke-linecap="round" stroke-width="4"></path>
                                    </svg>
                                    <div class="absolute inset-0 flex flex-col items-center justify-center">
                                        <span class="text-label-caps text-outline uppercase">Mayor</span>
                                        <span class="text-headline-md text-on-background">Alquiler</span>
                                    </div>
                                </div>
                            </div>
                            <!-- Category Breakdown List -->
                            <div class="flex flex-col gap-4">
                                <h3 class="text-headline-md text-on-background px-2">
                                    Desglose por Categoría
                                </h3>
                                <!-- Category Item -->
                                <div
                                    class="flex items-center gap-4 p-4 rounded-xl hover:bg-surface-container-low transition-colors group">
                                    <div class="size-12 rounded-full overflow-hidden flex items-center justify-center">
                                        <img alt="Alquiler" class="w-full h-full object-cover"
                                            src="https://lh3.googleusercontent.com/aida/ADBb0ujDE3nXajTw7SKeIfspRQmwlFn-eFjYHkUE1zlxreEJpJyiDmffwDXdeDUUMlGlf2SaV-JAy7QAYXEyFB7oOu6p8mq_oMftvhfSpFXocVI6saTX8ffMwERil3DmH4fEzohwp0DbE-wMLNW5F06j-ypHslOl4yIKuOJ-Z-L74dTnTkItKUauGK3VrPMX257gsCoPYAZi9ZRweQ0Y1X9hZaoBUYu-jEwrSP24debKY_4rTdQ5tHGS09LiSsU" />
                                    </div>
                                    <div class="flex-1">
                                        <div class="flex justify-between items-center mb-1">
                                            <p class="text-body-lg font-bold text-on-background">
                                                Alquiler
                                            </p>
                                            <p class="text-body-sm font-bold text-on-background">
                                                $1,035.00
                                            </p>
                                        </div>
                                        <div class="w-full h-2 bg-surface-container rounded-full overflow-hidden">
                                            <div class="h-full bg-primary rounded-full" style="width: 30%"></div>
                                        </div>
                                        <p class="text-label-caps text-outline mt-1">
                                            30% DEL TOTAL
                                        </p>
                                    </div>
                                </div>
                                <!-- Category Item -->
                                <div
                                    class="flex items-center gap-4 p-4 rounded-xl hover:bg-surface-container-low transition-colors group">
                                    <div
                                        class="size-12 rounded-full bg-secondary-fixed-dim flex items-center justify-center text-on-secondary-fixed">
                                        <span class="material-symbols-outlined"
                                            data-weight="fill">medical_services</span>
                                    </div>
                                    <div class="flex-1">
                                        <div class="flex justify-between items-center mb-1">
                                            <p class="text-body-lg font-bold text-on-background">
                                                Salud
                                            </p>
                                            <p class="text-body-sm font-bold text-on-background">
                                                $862.50
                                            </p>
                                        </div>
                                        <div class="w-full h-2 bg-surface-container rounded-full overflow-hidden">
                                            <div class="h-full bg-secondary rounded-full" style="width: 25%"></div>
                                        </div>
                                        <p class="text-label-caps text-outline mt-1">
                                            25% DEL TOTAL
                                        </p>
                                    </div>
                                </div>
                                <!-- Category Item -->
                                <div
                                    class="flex items-center gap-4 p-4 rounded-xl hover:bg-surface-container-low transition-colors group">
                                    <div
                                        class="size-12 rounded-full bg-tertiary-fixed flex items-center justify-center text-tertiary">
                                        <span class="material-symbols-outlined" data-weight="fill">devices</span>
                                    </div>
                                    <div class="flex-1">
                                        <div class="flex justify-between items-center mb-1">
                                            <p class="text-body-lg font-bold text-on-background">
                                                Tecnología
                                            </p>
                                            <p class="text-body-sm font-bold text-on-background">
                                                $690.00
                                            </p>
                                        </div>
                                        <div class="w-full h-2 bg-surface-container rounded-full overflow-hidden">
                                            <div class="h-full bg-tertiary-container rounded-full" style="width: 20%">
                                            </div>
                                        </div>
                                        <p class="text-label-caps text-outline mt-1">
                                            20% DEL TOTAL
                                        </p>
                                    </div>
                                </div>
                                <!-- Category Item -->
                                <div
                                    class="flex items-center gap-4 p-4 rounded-xl hover:bg-surface-container-low transition-colors group">
                                    <div
                                        class="size-12 rounded-full bg-surface-container flex items-center justify-center text-outline">
                                        <span class="material-symbols-outlined" data-weight="fill">more_horiz</span>
                                    </div>
                                    <div class="flex-1">
                                        <div class="flex justify-between items-center mb-1">
                                            <p class="text-body-lg font-bold text-on-background">
                                                Otros
                                            </p>
                                            <p class="text-body-sm font-bold text-on-background">
                                                $862.50
                                            </p>
                                        </div>
                                        <div class="w-full h-2 bg-surface-container rounded-full overflow-hidden">
                                            <div class="h-full bg-outline-variant rounded-full" style="width: 25%">
                                            </div>
                                        </div>
                                        <p class="text-label-caps text-outline mt-1">
                                            25% DEL TOTAL
                                        </p>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>

</html>
